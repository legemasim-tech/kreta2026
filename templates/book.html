<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">

    <style>
        {{ css|safe }}
    </style>

</head>

<body>

<!-- =========================
     TITELSEITE
========================= -->

<section class="cover">

    <img class="cover-image" src="{{ cover_image }}">

    <div class="cover-text">

        <h1>{{ book.title }}</h1>

        <h2>{{ book.subtitle }}</h2>

        <p class="subtitle">
            {{ book.location }}
        </p>

        <p class="persons">
            {{ book.people }}
        </p>

        <p class="dates">
            {{ book.dates }}
        </p>

    </div>

</section>

<!-- =========================
     BUCHSEITEN
========================= -->

{% for page in pages %}

<section class="page">

    <h1>{{ page.title }}</h1>

    {% if page.image %}
    <img class="wide-image" src="{{ page.image }}">
    {% endif %}

    <div class="content">

        {{ page.text|safe }}

    </div>

</section>

{% endfor %}

</body>

</html>
